<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asistencia</title>

<style>
body { font-family: sans-serif; padding: 10px; }

.alumno {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
  padding: 8px;
  border-bottom: 1px solid #ccc;
}

button {
  font-size: 18px;
  padding: 10px;
  margin-left: 5px;
  border: none;
  border-radius: 6px;
}

.presente { background: #4CAF50; color: white; }
.ausente { background: #f44336; color: white; }

.activo {
  outline: 3px solid black;
}

#guardar {
  width: 100%;
  margin-top: 20px;
  font-size: 20px;
  padding: 15px;
}
</style>
</head>

<body>

<h2>Asistencia</h2>

<div id="lista">Cargando alumnos...</div>

<button id="guardar" onclick="guardar()">GUARDAR</button>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzkycQfqtdqN2uLSifb9YUus6kFczmaqhJeP7GdEJSVedAvycOUNIMQ4_Lm4msWbvPL/exec";

let alumnos = [];
let estado = {};

// 🔹 JSONP callback (esto evita CORS)
function recibirAlumnos(data) {
  alumnos = data;

  const cont = document.getElementById("lista");
  cont.innerHTML = "";

  alumnos.forEach((a, i) => {
    estado[i] = "";

    const div = document.createElement("div");
    div.className = "alumno";

    div.innerHTML = `
      <span>${a.apellido}, ${a.nombre}</span>
      <div>
        <button class="presente" onclick="setEstado(${i}, 'P', this)">P</button>
        <button class="ausente" onclick="setEstado(${i}, 'A', this)">A</button>
      </div>
    `;

    cont.appendChild(div);
  });
}

// 🔹 Cargar alumnos usando JSONP
function cargar() {
  const script = document.createElement("script");
  script.src = URL + "?callback=recibirAlumnos";
  document.body.appendChild(script);
}

// 🔹 Selección visual
function setEstado(i, val, btn) {
  estado[i] = val;

  const botones = btn.parentElement.querySelectorAll("button");
  botones.forEach(b => b.classList.remove("activo"));

  btn.classList.add("activo");
}

// 🔹 Guardar (sin CORS)
async function guardar() {
  const data = alumnos.map((a, i) => ({
    apellido: a.apellido,
    nombre: a.nombre,
    estado: estado[i] || "A"
  }));

  await fetch(URL, {
    method: "POST",
    body: JSON.stringify({ asistencia: data }),
    mode: "no-cors"
  });

  alert("Asistencia guardada");
}

// iniciar
cargar();
</script>

</body>
</html>
