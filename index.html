<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: sans-serif; padding: 10px; }
.alumno {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}
button {
  font-size: 18px;
  padding: 10px;
  margin-left: 5px;
}
.presente { background: #4CAF50; color: white; }
.ausente { background: #f44336; color: white; }
</style>
</head>
<body>

<h2>Asistencia</h2>

<div id="lista"></div>

<button onclick="guardar()" style="width:100%; margin-top:20px; font-size:20px;">
GUARDAR
</button>

<script>
const URL = "https://script.google.com/macros/s/AKfycbx71dYg_Z39mgsRj09tbblAIXh8mBE6v1zpdpoE_lXcB5HsMI4JN2xwhbkdL4GMEeHm/exec";

let alumnos = [];
let estado = {};

async function cargar() {
  const res = await fetch(URL);
  alumnos = await res.json();

  const cont = document.getElementById("lista");
  cont.innerHTML = "";

  alumnos.forEach((a, i) => {
    estado[i] = "";

    const div = document.createElement("div");
    div.className = "alumno";

    div.innerHTML = `
      <span>${a.apellido}, ${a.nombre}</span>
      <div>
        <button class="presente" onclick="setEstado(${i}, 'P', this)">P</button>
        <button class="ausente" onclick="setEstado(${i}, 'A', this)">A</button>
      </div>
    `;

    cont.appendChild(div);
  });
}

function setEstado(i, val, btn) {
  estado[i] = val;

  const botones = btn.parentElement.querySelectorAll("button");
  botones.forEach(b => b.style.opacity = "0.5");

  btn.style.opacity = "1";
}

async function guardar() {
  const data = alumnos.map((a, i) => ({
    apellido: a.apellido,
    nombre: a.nombre,
    estado: estado[i] || "A"
  }));

  await fetch(URL, {
    method: "POST",
    body: JSON.stringify({ asistencia: data })
  });

  alert("Asistencia guardada");
}

cargar();
</script>

</body>
</html>
