<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Asistencia</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: #f5f7fa;
}

.container {
  max-width: 600px;
}

/* Scroll */
#lista {
  max-height: 70vh;
  overflow-y: auto;
}

/* Alumno */
.alumno {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  margin-bottom: 8px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

/* Botón estado */
.btn-estado {
  min-width: 60px;
  font-weight: bold;
}

/* Verde amable */
.presente {
  background-color: #81c784 !important;
  color: white;
}

/* Rojo amable */
.ausente {
  background-color: #e57373 !important;
  color: white;
}

/* Botón guardar fijo */
#guardar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  border-radius: 0;
  font-size: 20px;
  padding: 15px;
}
</style>
</head>

<body>

<div class="container mt-3 mb-5">
  <h3 class="text-center mb-3">Asistencia</h3>

  <div id="lista">
    Cargando alumnos...
  </div>
</div>

<button id="guardar" class="btn btn-primary" onclick="guardar()">
  GUARDAR
</button>

<script>
const BASE = "https://joecoolman.pythonanywhere.com";

let alumnos = [];
let estado = {};

// 🔹 Cargar alumnos
async function cargar() {
  const res = await fetch(BASE + "/alumnos");
  alumnos = await res.json();

  const cont = document.getElementById("lista");
  cont.innerHTML = "";

  alumnos.forEach((a, i) => {
    estado[i] = "P"; // TODOS presentes por defecto

    const div = document.createElement("div");
    div.className = "alumno";

    div.innerHTML = `
      <span>${a.apellido}, ${a.nombre}</span>
      <button class="btn btn-estado presente" onclick="toggle(${i}, this)">
        P
      </button>
    `;

    cont.appendChild(div);
  });
}

// 🔹 Toggle P ↔ A
function toggle(i, btn) {
  if (estado[i] === "P") {
    estado[i] = "A";
    btn.textContent = "A";
    btn.classList.remove("presente");
    btn.classList.add("ausente");
  } else {
    estado[i] = "P";
    btn.textContent = "P";
    btn.classList.remove("ausente");
    btn.classList.add("presente");
  }
}

// 🔹 Guardar
async function guardar() {
  const data = alumnos.map((a, i) => ({
    apellido: a.apellido,
    nombre: a.nombre,
    estado: estado[i]
  }));

  await fetch(BASE + "/guardar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("Asistencia guardada");
}

// iniciar
cargar();
</script>

</body>
</html>
