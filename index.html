<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: sans-serif; padding: 10px; }

.alumno {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
  padding: 8px;
  border-bottom: 1px solid #ccc;
}

button {
  font-size: 18px;
  padding: 10px;
  margin-left: 5px;
  border-radius: 6px;
  border: none;
}

.presente { background: green; color: white; }
.ausente { background: red; color: white; }
.activo { outline: 3px solid black; }

#guardar {
  width: 100%;
  margin-top: 20px;
  font-size: 20px;
  padding: 15px;
}
</style>
</head>

<body>

<h2>Asistencia</h2>

<div id="lista">Cargando...</div>

<button id="guardar" onclick="guardar()">GUARDAR</button>

<script>
const BASE = "https://joecoolman.pythonanywhere.com";

let alumnos = [];
let estado = {};

async function cargar() {
  const res = await fetch(BASE + "/alumnos");
  alumnos = await res.json();

  const cont = document.getElementById("lista");
  cont.innerHTML = "";

  alumnos.forEach((a, i) => {
    estado[i] = "";

    const div = document.createElement("div");
    div.className = "alumno";

    div.innerHTML = `
      <span>${a.apellido}, ${a.nombre}</span>
      <div>
        <button class="presente" onclick="setEstado(${i}, 'P', this)">P</button>
        <button class="ausente" onclick="setEstado(${i}, 'A', this)">A</button>
      </div>
    `;

    cont.appendChild(div);
  });
}

function setEstado(i, val, btn) {
  estado[i] = val;

  const botones = btn.parentElement.querySelectorAll("button");
  botones.forEach(b => b.classList.remove("activo"));

  btn.classList.add("activo");
}

async function guardar() {
  const data = alumnos.map((a, i) => ({
    apellido: a.apellido,
    nombre: a.nombre,
    estado: estado[i] || "A"
  }));

  await fetch(BASE + "/guardar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("Asistencia guardada");
}

cargar();
</script>

</body>
</html>
